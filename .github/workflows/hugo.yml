# Build the exampleSite with the checked-out theme and deploy it to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - main
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout into a fixed directory so the theme dir name matches
      # theme = "hugo-theme-simple" regardless of the repository name
      - uses: actions/checkout@v4
        with:
          path: hugo-theme-simple
          fetch-depth: 1

      # github pages config
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      # hugo install
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.164.0'
          extended: false

      # build the exampleSite against the checked-out theme
      - name: Build
        run: |
          hugo \
            --minify \
            --environment production \
            --themesDir ../.. \
            --theme hugo-theme-simple \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
        working-directory: hugo-theme-simple/exampleSite

      # upload public folder
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./hugo-theme-simple/exampleSite/public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
