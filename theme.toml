# theme.toml template for a Hugo theme
# See https://github.com/gohugoio/hugoThemes#themetoml for an example

name = "Hugo-Theme-Simple"
license = "MIT"
licenselink = "https://github.com/simple-is-awesome/Hugo-Theme-Simple/blob/main/LICENSE"
description = "A simple, clean blog theme built on Bootstrap 5 — multilingual (en/zh) with i18n, dark/light/system mode, archive and tag-cloud layouts, collapsible table of contents, and utterances comments."
homepage = "https://github.com/simple-is-awesome/Hugo-Theme-Simple"
demosite = "https://simple-is-awesome.github.io/Hugo-Theme-Simple/"
tags = [
  "blog",
  "simple",
  "clean",
  "responsive",
  "multilingual",
  "dark mode",
  "bootstrap"
]
features = [
  "multilingual (en/zh)",
  "dark mode",
  "bootstrap 5",
  "archive layout",
  "tags cloud",
  "table of contents",
  "utterances comments",
  "rss",
  "seo"
]
min_version = "0.146.0"

[author]
  name = "jiakai"
  homepage = "https://github.com/real-jiakai"
